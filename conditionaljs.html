    <script>
        //conditional statements:- JavaScript uses conditional statements to perform different 
        // actions based on whether a specified condition is true or false. The primary types
        //  of conditional statements include if...else, else if, switch, and the ternary operator

        //if conditions
        //age validation for voting

        let age=23;
        if(age>=18){
            console.log(age +  " is a valid age of vote casting!");
        }

        //if-else
        let myAge=20;
        if (myAge<18){
            console.log("not valid");
        }
        else{
            console.log("valid age")
        }
        //switch case
        //grade
        let grade='B';
        switch(grade){
            case 'A':result="First Division";
            break;

            case'B':result="Second Division";
            break;

            case 'c':result:"Third Division";
            break;

            default:result="fail";
        }
        console.log(result);

        //if-else

        let marks=95;
        if(marks>=90 && marks<=100){
            console.log("first division");
        }
        else if(marks>=80 && marks<=90){
            console.log("second division");
        }
        else if(marks>=70 && marks<= 80){
            console.log("third division");

        }
        else{
            console.log("fail");
        }
