//      Synchronous and Asynchronous Communication in Programming
// Synchronous communication in web development refers to operations that execute sequentially,
//  meaning the program waits for each task to complete before moving to the next. 
//  This approach is simple to reason about but can lead to performance bottlenecks, 
//  as the entire program halts until the current operation finishes. 
//  Asynchronous communication, on the other hand, allows tasks to run independently
//   without blocking the main program flow, making it more efficient and responsive.
// Asynchronous operations often use callbacks, promises, or async/await to handle
//  delayed results, allowing other code to run while waiting for the async task to complete.  -->

function cal(){
    function add(a,b){
        console.log("addition is " + (a+b));
    }
    function mul(x,y){
        console.log("multipliaction " +  (x*y));
    }
    add(3,5)
    mul(3,5)
  

}
cal();
//short code for above function i.e. arrow function
let msg1=() => console.log("hello abes ec");
msg1();
// arrow function using multiple line  
let msg2=(a,b)=>{
    var num1=a;
    var num2=b;
    var res=num1/num2;
    console.log("result is " + res);
}

msg2(10,20);

</script>
